version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: all
  # Keep the "all linters" posture, but avoid duplicate/deprecated checks and
  # repository-policy linters that need project-specific allow/deny lists.
  disable:
    - depguard
    - err113
    - exhaustruct
    - forbidigo
    - gomodguard
    - goheader
    - importas
    - mnd
    - noinlineerr
    - tagliatelle
    - varnamelen
    - wrapcheck
    - gochecknoglobals
    - wsl
    - wsl_v5
  settings:
    cyclop:
      max-complexity: 50
    exhaustive:
      default-signifies-exhaustive: true
    gocognit:
      min-complexity: 60
    gocyclo:
      min-complexity: 50
    funlen:
      lines: 110
      statements: 100
    ireturn:
      allow:
        - error
        - empty
        - anon
        - stdlib
        - github.com/charmbracelet/bubbletea.Model
    lll:
      line-length: 120
      tab-width: 1
    nlreturn:
      block-size: 3
    revive:
      enable-default-rules: true
      severity: warning
      rules:
        - name: file-length-limit
          severity: error
          arguments:
            - max: 500
              skip-comments: true
              skip-blank-lines: true
        - name: line-length-limit
          arguments:
            - 120
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
