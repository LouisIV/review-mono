version: "3"

vars:
  BINARY: review
  BUILD_DIR: bin
  GOLANGCI_LINT_VERSION:
    sh: cat .golangci-lint-version

tasks:
  default:
    desc: Build the review CLI
    deps:
      - build

  test:
    desc: Run the Go test suite
    cmds:
      - GOCACHE="${GOCACHE:-/tmp/review-go-cache}" go test ./...

  bench:
    desc: Run TUI render-path benchmarks; pass args with `task bench -- -count=10`
    cmds:
      - GOCACHE="${GOCACHE:-/tmp/review-go-cache}" go test -run '^$' -bench 'Benchmark(ModelView|ToWidgetRows|RenderReview|Unresolved)' -benchmem ./internal/tui ./internal/tui/widgets {{.CLI_ARGS}}

  lint:
    desc: Run golangci-lint
    deps:
      - lint-install
    cmds:
      - GOCACHE="${GOCACHE:-/tmp/review-go-cache}" GOLANGCI_LINT_CACHE="${GOLANGCI_LINT_CACHE:-/tmp/review-golangci-cache}" "{{.BUILD_DIR}}/golangci-lint" run ./...

  hooks-install:
    desc: Configure git to use the repo's tracked hooks
    cmds:
      - chmod +x .githooks/pre-push
      - git config core.hooksPath .githooks
      - echo "Installed git hooks from .githooks"

  lint-install:
    desc: Install the pinned golangci-lint binary into ./bin
    cmds:
      - mkdir -p "{{.BUILD_DIR}}"
      - GOBIN="$(pwd)/{{.BUILD_DIR}}" GOCACHE="${GOCACHE:-/tmp/review-go-cache}" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
    status:
      - test -x "{{.BUILD_DIR}}/golangci-lint"
      - '"{{.BUILD_DIR}}/golangci-lint" version | grep -q "$(sed ''s/^v//'' .golangci-lint-version)"'

  build:
    desc: Build the review CLI into ./bin
    cmds:
      - mkdir -p "{{.BUILD_DIR}}"
      - GOCACHE="${GOCACHE:-/tmp/review-go-cache}" go build -o "{{.BUILD_DIR}}/{{.BINARY}}" .
    sources:
      - "**/*.go"
      - go.mod
    generates:
      - "{{.BUILD_DIR}}/{{.BINARY}}"

  install:
    desc: Install the review CLI, defaulting to $HOME/.local/bin
    deps:
      - build
    cmds:
      - mkdir -p "${INSTALL_DIR:-$HOME/.local/bin}"
      - install -m 0755 "{{.BUILD_DIR}}/{{.BINARY}}" "${INSTALL_DIR:-$HOME/.local/bin}/{{.BINARY}}"
      - echo "Installed {{.BINARY}} to ${INSTALL_DIR:-$HOME/.local/bin}/{{.BINARY}}"

  uninstall:
    desc: Remove the installed review CLI
    cmds:
      - rm -f "${INSTALL_DIR:-$HOME/.local/bin}/{{.BINARY}}"
      - echo "Removed ${INSTALL_DIR:-$HOME/.local/bin}/{{.BINARY}}"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf "{{.BUILD_DIR}}"

  run:
    desc: Run the CLI via go run; pass args with `task run -- open`
    cmds:
      - GOCACHE="${GOCACHE:-/tmp/review-go-cache}" go run . {{.CLI_ARGS}}

  daemon:
    desc: Run the daemon in the foreground
    cmds:
      - GOCACHE="${GOCACHE:-/tmp/review-go-cache}" go run . daemon run {{.CLI_ARGS}}
