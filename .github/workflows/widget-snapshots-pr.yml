name: Widget Snapshots (PR)

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  diff:
    name: Widget Visual Diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: pr

      - name: Get base SHA
        id: base-sha
        run: |
          git -C pr fetch origin ${{ github.base_ref }} --depth=1
          echo "sha=$(git -C pr rev-parse origin/${{ github.base_ref }})" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        id: base-cache
        with:
          path: |
            base-text/
            base-png/
          key: widget-base-${{ steps.base-sha.outputs.sha }}

      - uses: actions/checkout@v6
        if: steps.base-cache.outputs.cache-hit != 'true'
        with:
          ref: ${{ github.base_ref }}
          path: base

      - uses: actions/setup-go@v6
        with:
          go-version-file: pr/go.mod
          cache: true
          cache-dependency-path: pr/go.sum

      - name: Build PR binary
        run: go build -o bin/review .
        working-directory: pr

      - name: Build base binary
        if: steps.base-cache.outputs.cache-hit != 'true'
        run: go build -o bin/review .
        working-directory: base

      - name: Install freeze
        run: GOBIN=/usr/local/bin go install github.com/charmbracelet/freeze@latest

      - name: Render base snapshots
        if: steps.base-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p base-text base-png
          for widget in $(NO_COLOR=1 base/bin/review widget list); do
            NO_COLOR=1 base/bin/review widget "$widget" > "base-text/$widget.txt"
            COLORTERM=truecolor base/bin/review widget "$widget" | freeze --language ansi --output "base-png/$widget.png"
          done

      - name: Render PR text snapshots
        run: |
          mkdir -p pr-text
          for widget in $(NO_COLOR=1 pr/bin/review widget list); do
            NO_COLOR=1 pr/bin/review widget "$widget" > "pr-text/$widget.txt"
          done

      - name: Detect changes and upload screenshots
        id: changes
        run: |
          mkdir -p pr-png
          > pr-urls.txt
          > base-urls.txt
          changed=""

          for widget in $(pr/bin/review widget list); do
            base_txt="base-text/$widget.txt"
            pr_txt="pr-text/$widget.txt"

            if [ ! -f "$base_txt" ] || ! diff -q "$base_txt" "$pr_txt" > /dev/null 2>&1; then
              COLORTERM=truecolor pr/bin/review widget "$widget" | freeze --language ansi --output "pr-png/$widget.png"
              echo "$widget=$(curl -sS -F 'reqtype=fileupload' -F 'userhash=${{ secrets.CATBOX_USERHASH }}' -F 'fileToUpload=@pr-png/'"$widget"'.png' https://catbox.moe/user/api.php)" >> pr-urls.txt

              if [ -f "base-png/$widget.png" ]; then
                echo "$widget=$(curl -sS -F 'reqtype=fileupload' -F 'userhash=${{ secrets.CATBOX_USERHASH }}' -F 'fileToUpload=@base-png/'"$widget"'.png' https://catbox.moe/user/api.php)" >> base-urls.txt
              fi

              changed="$changed $widget"
            fi
          done

          echo "changed=${changed# }" >> $GITHUB_OUTPUT

      - name: Post widget diff comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- widget-snapshots -->';
            const pr = context.issue.number;

            const existing = (await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            })).data.find(c => c.body.includes(marker));

            const changed = '${{ steps.changes.outputs.changed }}'.trim().split(' ').filter(Boolean);

            if (changed.length === 0) {
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                });
              }
              return;
            }

            const parseUrls = path => {
              try {
                return Object.fromEntries(
                  fs.readFileSync(path, 'utf8').trim().split('\n')
                    .filter(Boolean)
                    .map(l => { const i = l.indexOf('='); return [l.slice(0, i), l.slice(i + 1)]; })
                );
              } catch { return {}; }
            };

            const prUrls   = parseUrls('pr-urls.txt');
            const baseUrls = parseUrls('base-urls.txt');

            let body = `${marker}\n## Widget Snapshots\n\n${changed.length} widget(s) changed.\n\n`;

            for (const widget of changed) {
              const hasBase = !!baseUrls[widget];
              body += `### \`${widget}\`${!hasBase ? ' _(new)_' : ''}\n\n`;
              if (hasBase) {
                body += `| Before | After |\n|--------|-------|\n`;
                body += `| ![before](${baseUrls[widget]}) | ![after](${prUrls[widget]}) |\n\n`;
              } else {
                body += `![after](${prUrls[widget]})\n\n`;
              }
            }

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }
